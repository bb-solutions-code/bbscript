name: Release build

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            suffix: win64
            inno: true
          - os: ubuntu-latest
            suffix: linux-x86_64
            inno: false
          - os: macos-14
            suffix: darwin-arm64
            inno: false
          - os: macos-13
            suffix: darwin-x64
            inno: false

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/bbpm
          path: bbpm

      - uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/foblox
          path: foblox

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Inno Setup (Windows)
        if: matrix.inno
        run: choco install innosetup -y

      - name: Set version
        id: version
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"
          else
            echo "version=0.0.0-dev" >> "$GITHUB_OUTPUT"
          fi

      - name: Foblox tree ref (git)
        shell: bash
        run: |
          echo "FOBLOX_REF=$(git -C foblox rev-parse HEAD 2>/dev/null || echo unknown)" >> "$GITHUB_ENV"

      - name: Build PyInstaller bundle
        env:
          BBSCRIPT_VERSION: ${{ steps.version.outputs.version }}
        run: python packaging/scripts/build_release.py

      - name: Archive tarball (Unix)
        if: runner.os != 'Windows'
        env:
          BBSCRIPT_VERSION: ${{ steps.version.outputs.version }}
        run: python packaging/scripts/archive_bundle.py ${{ matrix.suffix }}

      - name: Inno Setup installer
        if: matrix.inno
        env:
          BBSCRIPT_VERSION: ${{ steps.version.outputs.version }}
        shell: pwsh
        run: |
          $iscc = "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
          & $iscc "/DMyAppVersion=$env:BBSCRIPT_VERSION" packaging/windows/BBScript.iss

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: bbscript-${{ matrix.suffix }}
          path: |
            packaging/pyinstaller/dist/bbscript-bundle/**
            dist/*.tar.gz
            packaging/windows/dist/*.exe
          if-no-files-found: ignore

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: assets
          pattern: bbscript-*
          merge-multiple: true

      - name: Collect release files
        run: |
          mkdir -p upload
          find assets -type f \( -name '*.tar.gz' -o -name '*.exe' \) -exec cp -t upload/ {} +
          ls -la upload

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: upload/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
